---
machine:
  install:
    disk: /dev/sda
    image: factory.talos.dev/metal-installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0:v1.12.7

  # Configures the node labels for the machine.
  nodeLabels:
    beehive.lan64.de/model: Wyse-5070
    beehive.lan64.de/cpu: Pentium-J5005
    beehive.lan64.de/memory: 16GB
    beehive.lan64.de/ephemeral: 50GB
    beehive.lan64.de/storage: 200GB
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: net0
selector:
  match: true # as there is a single link only, we can match it this way
---
apiVersion: v1alpha1
kind: LinkConfig
name: net0
addresses:
  - address: 192.168.178.11/24
  - address: fd00::11/16
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: queen-and-bee-01
auto: off
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.transport == 'sata'
  minSize: 2GB
  maxSize: 50GB
  grow: false
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: local-path-provisioner
volumeType: partition
provisioning:
  diskSelector:
    match: disk.transport == 'sata'
  minSize: 2GB
  grow: true
