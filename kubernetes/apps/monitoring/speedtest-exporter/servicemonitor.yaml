apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: speedtest-exporter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: speedtest-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1h
      scrapeTimeout: 1m
