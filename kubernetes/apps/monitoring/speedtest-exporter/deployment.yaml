apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: speedtest-exporter
  template:
    metadata:
      labels:
        app: speedtest-exporter
    spec:
      automountServiceAccountToken: false
      containers:
        - name: speedtest-exporter
          image: ghcr.io/heathcliff26/speedtest-exporter:v1.4.1
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            requests:
              cpu: 30m
              memory: 20Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
