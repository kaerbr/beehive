---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 24h
  values:
    controllers:
      podinfo:
        replicas: 1
        containers:
          podinfo:
            image:
              repository: ghcr.io/stefanprodan/podinfo
              tag: 6.7.0
            env:
              PODINFO_UI_COLOR: "#70044e"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              privileged: false
              capabilities:
                drop:
                  - ALL
        pod:
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

    service:
      podinfo:
        controller: podinfo
        ports:
          http:
            port: 9898

    ingress:
      podinfo:
        className: traefik
        hosts:
          - host: podinfo.beehive.lan64.de
            paths:
              - path: /
                service:
                  identifier: podinfo
                  port: http
