---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 24h
  values:
    controllers:
      n8n:
        replicas: 1
        containers:
          n8n:
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.23.0
            # env:
            #   n8n_UI_COLOR: "#70044e"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              # readOnlyRootFilesystem: true
              privileged: false
              capabilities:
                drop:
                  - ALL
        pod:
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

    service:
      n8n:
        controller: n8n
        ports:
          http:
            port: 5678

    ingress:
      n8n:
        className: traefik
        hosts:
          - host: n8n.beehive.lan64.de
            paths:
              - path: /
                service:
                  identifier: n8n
                  port: http
