apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniserve
  labels:
    app: miniserve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniserve
  template:
    metadata:
      labels:
        app: miniserve
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: miniserve
          image: svenstaro/miniserve:0.35.0-alpine
          args:
            - /data
            - --upload-files
            - --mkdir
            - --rm-files
            - --qrcode
            - --on-duplicate-files
            - rename
            - --port
            - "8080"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: paperless-ngx-backup
              mountPath: /data/paperless-ngx/backup
            - name: paperless-ngx-consume
              mountPath: /data/paperless-ngx/consume
            - name: nas
              mountPath: /data/nas
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: paperless-ngx-backup
          persistentVolumeClaim:
            claimName: paperless-ngx-backup
        - name: paperless-ngx-consume
          persistentVolumeClaim:
            claimName: paperless-ngx-consume
        - name: nas
          persistentVolumeClaim:
            claimName: nas
        - name: tmp
          emptyDir: {}
