---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: omni-tools
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 24h
  values:
    controllers:
      omni-tools:
        replicas: 1
        containers:
          omni-tools:
            image:
              repository: iib0011/omni-tools
              tag: 0.6
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 2Gi
            #securityContext:
            #  allowPrivilegeEscalation: false
            #  # readOnlyRootFilesystem: true
            #  privileged: false
            #  capabilities:
            #    drop:
            #      - ALL
        pod:
          automountServiceAccountToken: false
          #securityContext:
          #  runAsUser: 1000
          #  runAsGroup: 1000
          #  fsGroup: 1000
          #  runAsNonRoot: true
          #  seccompProfile:
          #    type: RuntimeDefault

    service:
      omni-tools:
        controller: omni-tools
        ports:
          http:
            port: 80

    ingress:
      omni-tools:
        className: traefik
        hosts:
          - host: omni-tools.beehive.lan64.de
            paths:
              - path: /
                service:
                  identifier: omni-tools
                  port: http
